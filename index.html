<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email 簽名檔產生器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ============================================================
       CSS VARIABLES & RESET
       ============================================================ */
    :root {
      --bg:        #08080f;
      --bg-card:   rgba(255,255,255,0.04);
      --bg-input:  rgba(255,255,255,0.06);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.18);
      --text:      #eeeef8;
      --text-sub:  #8888aa;
      --text-muted:#3d3d55;
      --a1: #0066ff;
      --a2: #00c6ff;
      --glow: rgba(0,102,255,0.22);
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
    }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    /* ── Top glow orb ── */
    body::after {
      content: '';
      position: fixed; top: -220px; left: 50%; transform: translateX(-50%);
      width: 900px; height: 440px;
      background: radial-gradient(ellipse at center, var(--glow) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
      transition: background 0.6s ease;
    }

    /* ============================================================
       APP WRAPPER
       ============================================================ */
    .app {
      position: relative; z-index: 1;
      max-width: 1380px; margin: 0 auto;
      padding: 0 28px;
      height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      flex-shrink: 0;
      padding: 14px 28px;
      margin: 0 -28px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,15,0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .header-icon {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 0 24px var(--glow);
      transition: background 0.5s, box-shadow 0.5s;
    }
    .header h1 {
      font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800;
      letter-spacing: -0.025em; line-height: 1;
      background: linear-gradient(120deg, #ffffff 30%, var(--a2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.5s;
    }
    .header p { font-size: 12.5px; color: var(--text-sub); margin-top: 4px; }
    .github-link {
      margin-left: auto; display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-sub); font-size: 13px; font-weight: 500;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: all 0.2s;
    }
    .github-link:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.08); }

    /* ============================================================
       SPLIT LAYOUT
       ============================================================ */
    .split {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      overflow: hidden;
      padding: 24px 0 16px;
    }
    @media (max-width: 860px) {
      html, body { height: auto; overflow: auto; }
      .app  { height: auto; overflow: visible; display: block; padding-bottom: 48px; }
      .split {
        grid-template-columns: 1fr;
        height: auto; overflow: visible;
        padding: 16px 0 0;
      }
      .form-panel  { height: auto; overflow: visible; }
      .preview-panel { height: auto; overflow: visible; }
    }

    /* ============================================================
       FORM PANEL
       ============================================================ */
    .form-panel {
      height: 100%; overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .form-panel::-webkit-scrollbar { width: 5px; }
    .form-panel::-webkit-scrollbar-track { background: transparent; }
    .form-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px;
      margin-bottom: 14px;
      backdrop-filter: blur(12px);
      transition: border-color 0.25s;
    }
    .card:hover { border-color: rgba(255,255,255,0.12); }
    .card:last-child { margin-bottom: 0; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-sub); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Scheme selector ── */
    .schemes { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .scheme-btn {
      border: 2px solid transparent; border-radius: 10px;
      padding: 10px 4px 8px; cursor: pointer;
      background: var(--bg-input);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .scheme-btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); }
    .scheme-btn.active { border-color: var(--a1); background: rgba(0,102,255,0.08); }
    .scheme-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .scheme-label { font-size: 10px; color: var(--text-sub); text-align: center; line-height: 1.3; }
    .scheme-btn.active .scheme-label { color: var(--text); }

    /* ── Fields ── */
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text-sub); margin-bottom: 5px; letter-spacing: 0.02em;
    }
    .field input {
      width: 100%; padding: 8px 11px;
      background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; -webkit-appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field input:focus {
      border-color: var(--a1);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .field input::placeholder { color: var(--text-muted); }

    /* ── Logo area ── */
    .logo-area { display: flex; gap: 12px; align-items: center; }
    .logo-thumb {
      width: 60px; height: 60px; border-radius: 11px; flex-shrink: 0;
      border: 1px solid var(--border); background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .logo-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-btns { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .btn-sm {
      padding: 7px 11px; border-radius: 7px;
      font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text-sub);
      text-align: center; transition: all 0.2s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.08); }
    #logoFileInput { display: none; }

    /* ============================================================
       PREVIEW PANEL
       ============================================================ */
    .preview-panel {
      height: 100%; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    /* ── Email mockup ── */
    .email-mockup {
      background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; backdrop-filter: blur(12px);
    }
    .email-titlebar {
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .dot-group { display: flex; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }
    .email-titlebar-label {
      flex: 1; text-align: center;
      font-size: 11px; color: var(--text-muted); font-weight: 500;
    }
    .email-meta {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 5px;
    }
    .email-meta-row {
      display: flex; gap: 8px; font-size: 11.5px; color: var(--text-sub);
    }
    .email-meta-row strong { color: var(--text-muted); font-weight: 600; min-width: 42px; }
    .email-body {
      padding: 20px 24px;
      background: #f4f4ef;
      font-family: Arial, Helvetica, sans-serif; font-size: 13px;
      color: #333; line-height: 1.6;
    }
    .email-body-text { margin-bottom: 18px; color: #555; }
    .email-divider {
      height: 1px; background: #ddd; margin-bottom: 18px;
    }

    /* ── Edit hint marquee ── */
    .edit-hint {
      overflow: hidden; white-space: nowrap;
      margin-bottom: 8px;
      background: rgba(37,99,235,0.10);
      border-radius: 4px; padding: 4px 10px;
      border-left: 2px solid #2563eb;
    }
    .edit-hint-text {
      font-size: 11px; color: #1e40af; font-weight: 600; letter-spacing: 0.4px;
    }
    #signaturePreview { display: block; }
    /* ── Inline editable fields in preview ── */
    .editable-label {
      outline: none;
      cursor: text;
      border-radius: 3px;
      padding: 1px 3px;
      margin: 0 -3px;
      transition: background 0.12s, box-shadow 0.12s, color 0.12s;
      display: inline-block;
      min-width: 6px;
      position: relative;
    }
    .editable-label:hover {
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.5);
    }
    .editable-label:focus {
      background: #ffffff;
      color: #1a1a2e !important;
      box-shadow: 0 0 0 2px #3b82f6;
    }

    /* ── Copy buttons ── */
    .copy-row { display: flex; gap: 12px; }
    .btn-copy {
      flex: 1; padding: 13px 18px; border-radius: 11px; border: none;
      font-family: 'Syne', sans-serif; font-size: 13.5px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .btn-copy-html {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff; box-shadow: 0 4px 20px var(--glow);
    }
    .btn-copy-html:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--glow); filter: brightness(1.08); }
    .btn-copy-html:active { transform: none; }
    .btn-copy-text {
      background: var(--bg-card); color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .btn-copy-text:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.07); }
    .btn-copy-download {
      background: var(--bg-card); color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .btn-copy-download:hover { color: var(--a2); border-color: var(--a1); background: rgba(255,255,255,0.06); }
    .btn-copy-image {
      background: var(--bg-card); color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .btn-copy-image:hover { color: var(--a2); border-color: var(--a1); background: rgba(255,255,255,0.06); }
    .btn-copy-image:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ── Code block (kept for reference, element removed from DOM) ── */
    .code-body {
      padding: 14px 16px; max-height: 140px; overflow: auto;
      font-family: 'Courier New', Courier, monospace; font-size: 10.5px;
      color: #5c6370; line-height: 1.55; word-break: break-all; white-space: pre-wrap;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(110px);
      background: rgba(8,8,20,0.96); border: 1px solid var(--a1);
      color: var(--text); padding: 11px 26px; border-radius: 100px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      z-index: 9999; white-space: nowrap;
      box-shadow: 0 4px 32px var(--glow);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), border-color 0.5s, box-shadow 0.5s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-check { font-size: 15px; }

    /* ============================================================
       ANIMATIONS
       ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.45s ease backwards; }
    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.16s; }
    .card:nth-child(4) { animation-delay: 0.22s; }
    .card:nth-child(5) { animation-delay: 0.28s; }
    .email-mockup { animation: fadeUp 0.45s 0.08s ease backwards; }
    .copy-row     { animation: fadeUp 0.45s 0.14s ease backwards; }
    .code-card    { animation: fadeUp 0.45s 0.20s ease backwards; }

    /* ============================================================
       SCROLLBAR GLOBAL
       ============================================================ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-icon" id="headerIcon">✉</div>
    <div>
      <h1>Email 簽名檔產生器</h1>
      <p>填寫資訊 · 即時預覽 · 一鍵複製 HTML，相容 Outlook / Gmail / Apple Mail</p>
    </div>
    <a href="https://github.com/bryanHsiao/email-signature-generator" target="_blank" class="github-link" title="GitHub Repo">
      <svg height="18" viewBox="0 0 16 16" width="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </header>

  <!-- ── Split layout ── -->
  <div class="split">

    <!-- ════════════════════════════
         LEFT: FORM PANEL
         ════════════════════════════ -->
    <aside class="form-panel">

      <!-- 配色方案 -->
      <div class="card">
        <div class="card-title">配色方案</div>
        <div class="schemes" id="schemesGrid"></div>
      </div>

      <!-- Logo -->
      <div class="card">
        <div class="card-title">公司 Logo</div>
        <div class="logo-area">
          <div class="logo-thumb">
            <img id="logoThumb" src="" alt="Logo Preview">
          </div>
          <div class="logo-btns">
            <label for="logoFileInput" class="btn-sm" style="cursor:pointer;">⬆ 上傳圖片</label>
            <input type="file" id="logoFileInput" accept="image/*">
            <button class="btn-sm" id="resetLogoBtn">↺ 使用預設 Logo</button>
          </div>
        </div>
        <div class="field" style="margin-top:12px;">
          <label>Logo 圖片網址（選填）</label>
          <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
        </div>
      </div>

      <!-- 外觀設定 -->
      <div class="card">
        <div class="card-title">外觀設定</div>
        <div class="field">
          <label>姓名顏色</label>
          <input type="color" id="nameColor" value="#1a1a2e" style="width:48px;height:32px;padding:2px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;cursor:pointer;">
        </div>
        <div class="field">
          <label>顯示右上圓圈裝飾</label>
          <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="showDots" checked style="width:16px;height:16px;cursor:pointer;accent-color:var(--a1);">
            <span style="font-size:12px;color:var(--text-sub);">顯示</span>
          </label>
        </div>
      </div>

    </aside><!-- /form-panel -->

    <!-- ════════════════════════════
         RIGHT: PREVIEW PANEL
         ════════════════════════════ -->
    <section class="preview-panel">

      <!-- Email mockup -->
      <div class="email-mockup">
        <div class="email-titlebar">
          <div class="dot-group">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <div class="email-titlebar-label">簽名預覽</div>
          <div style="width:52px"></div>
        </div>
        <div class="email-meta">
          <div class="email-meta-row"><strong>寄件者</strong> Bryan Hsiao &lt;bryanhsiao@domino.com.tw&gt;</div>
          <div class="email-meta-row"><strong>主旨</strong> Re: 報價單確認 &mdash; 崇太科技</div>
        </div>
        <div class="email-body">
          <div class="email-body-text">Hi，附上相關資料，如有任何問題請不吝告知，謝謝。</div>
          <div class="email-divider"></div>
          <div class="edit-hint"><span class="edit-hint-text">✏️ 點擊簽名中的任意文字即可直接編輯</span></div>
          <div id="signaturePreview"></div>
        </div>
      </div>

      <!-- Copy / Download buttons -->
      <div class="copy-row">
        <button class="btn-copy btn-copy-html" id="copyHtmlBtn">
          <span>⊞</span> 複製 HTML
        </button>
        <button class="btn-copy btn-copy-text" id="copyTextBtn">
          <span>≡</span> 複製純文字
        </button>
        <button class="btn-copy btn-copy-download" id="downloadHtmlBtn">
          <span>⬇</span> 下載 HTML
        </button>
        <button class="btn-copy btn-copy-image" id="downloadImgBtn">
          🖼 下載圖片
        </button>
      </div>

    </section><!-- /preview-panel -->

  </div><!-- /split -->
</div><!-- /app -->

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-check">✓</span>
  <span id="toastMsg">已複製到剪貼簿！</span>
</div>

<script>
/* ================================================================
   STATE
   ================================================================ */
const state = {
  nameEn:    'Bryan Hsiao',
  nameZh:    '蕭恩政',
  companyEn: 'ChunTai Tech Industrial Co.,Ltd',
  companyZh: '崇太科技實業有限公司',
  tieLine:   '02-2558-1229',
  mobile:    '0928-662-718',
  email:     'bryanhsiao@domino.com.tw',
  website:   'https://www.domino.com.tw',

/* ================================================================
   DEFAULT LOGO (Canvas → PNG data URI)
   Using PNG instead of SVG for maximum email client compatibility.
   ── 若要用公司 Logo，請在表單「Logo 圖片網址」填入公開網址，
      或用「上傳圖片」選取本機檔案（輸出 HTML 會 base64 嵌入，
      適用於 HCL Notes 本機簽名檔；如需相容 Outlook，請用 URL）。
   ================================================================ */
function makeDefaultLogoURI(p, s) {
  const size = 75;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x,     y,     x + r, y);
    ctx.closePath();
  }

  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, p); grad.addColorStop(1, s);
  roundedRect(0, 0, size, size, 14);
  ctx.fillStyle = grad; ctx.fill();

  roundedRect(7, 7, 61, 61, 10);
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('CHUNTAI', size / 2, 24);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 26px Arial';
  ctx.fillText('CT', size / 2, 51);

  return canvas.toDataURL('image/png');
}

function getLogoSrc() {
  if (state.logoSrc) return state.logoSrc;
  const sc = SCHEMES[state.scheme];
  return makeDefaultLogoURI(sc.p, sc.s);
}

/* ================================================================
   HTML ESCAPE
   ================================================================ */
function esc(v) {
  return String(v)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

/* ================================================================
   GENERATE SIGNATURE HTML
   ── Flat structure: single outer table, <p> tags for content
   ── No nested tables → consistent rendering in all email clients
   ================================================================ */
function generateSignatureHTML(forPreview = false) {
  const { nameEn, nameZh, companyEn, companyZh,
          tieLine, mobile, email, website, address, location,
          labelTieLine, labelMobile, labelEmail, labelMailing } = state;
  const { p: primary } = SCHEMES[state.scheme];
  const logo  = getLogoSrc();
  const logoW = state.logoWidth;
  const logoH = state.logoHeight;

  // ── Editable helper ──
  // Preview: contenteditable span; Email: plain escaped text
  const ed = (field, text, extraStyle = '') => forPreview
    ? `<span contenteditable="true" data-field="${field}" class="editable-label"${extraStyle ? ` style="${extraStyle}"` : ''}>${esc(text)}</span>`
    : esc(text);

  // ── Contact rows ──
  const P = 'margin:0 0 4px 0;padding:0;font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;line-height:1.4;';
  const contactLines = [];
  if (tieLine) contactLines.push(
    `<p style="${P}">${ed('labelTieLine', labelTieLine)}：${ed('tieLine', tieLine)}</p>`
  );
  if (mobile) contactLines.push(
    `<p style="${P}">${ed('labelMobile', labelMobile)}：${ed('mobile', mobile)}</p>`
  );
  if (email) contactLines.push(
    `<p style="${P}">${ed('labelEmail', labelEmail)}：${
      forPreview
        ? ed('email', email, `color:${primary};`)
        : `<a href="mailto:${esc(email)}" style="color:${primary};text-decoration:none;">${esc(email)}</a>`
    }</p>`
  );

  // ── Footer line: address + website + location ──
  const footerParts = [];
  if (address) footerParts.push(`${ed('labelMailing', labelMailing)}：${ed('address', address)}`);
  if (website) footerParts.push(
    forPreview
      ? ed('website', website, `color:${primary};`)
      : `<a href="${esc(website)}" target="_blank" style="color:${primary};text-decoration:none;">${esc(website)}</a>`
  );
  if (location) footerParts.push(ed('location', location));
  const footerHTML = footerParts.length
    ? `<p style="margin:0 0 4px 0;padding:0;font-size:12px;color:#333333;font-family:Arial,Helvetica,sans-serif;line-height:1.4;">${footerParts.join('&nbsp;&nbsp;')}</p>`
    : '';

  // ── Build inner content table (shared by preview & email) ──
  const innerTable = `<table cellpadding="0" cellspacing="0" border="0" width="100%" role="presentation"
       style="border-collapse:collapse;width:100%;">
  <tbody>

    <!-- ① Header: colored banner — logo + company names -->
    <tr>
      <td bgcolor="${primary}" style="background-color:${primary};padding:10px 14px;">
        <table cellpadding="0" cellspacing="0" border="0" width="100%" role="presentation" style="width:100%;">
          <tbody>
            <tr>
              <td style="padding-right:12px;vertical-align:middle;white-space:nowrap;width:1%;">
                <img src="${logo}" width="${logoW}" height="${logoH}" alt="${esc(companyZh)}"
                     style="display:block;border:0;outline:0;-ms-interpolation-mode:bicubic;max-width:${logoW}px;max-height:${logoH}px;">
              </td>
              <td style="vertical-align:middle;width:100%;">
                <span style="font-size:14px;font-weight:700;color:#ffffff;font-family:Arial,Helvetica,sans-serif;line-height:1.4;">
                  ${ed('companyZh', companyZh)}&nbsp;|&nbsp;${ed('companyEn', companyEn)}
                </span>
              </td>
              ${state.showDots ? `<td style="vertical-align:middle;text-align:right;padding-left:16px;padding-right:8px;white-space:nowrap;">
                <span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:#ff5f57;margin-right:5px;"></span>
                <span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:#ffbd2e;margin-right:5px;"></span>
                <span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:#28c941;"></span>
              </td>` : ''}
            </tr>
          </tbody>
        </table>
      </td>
    </tr>

    <!-- ② Body: white background, left accent border -->
    <tr>
      <td bgcolor="#ffffff"
          style="background-color:#ffffff;padding:12px 16px;">

        <!-- Name -->
        <p style="margin:0 0 8px 0;padding:0;font-size:17px;font-weight:700;color:${state.nameColor};font-family:Arial,Helvetica,sans-serif;line-height:1.2;">
          ${ed('nameEn', nameEn)}&nbsp;&nbsp;${ed('nameZh', nameZh)}
        </p>

        <!-- Contact rows -->
        ${contactLines.join('')}

        <!-- Footer: address / website / location -->
        ${footerHTML}

      </td>
    </tr>

  </tbody>
</table>`;

  // ── Preview: <div> wrapper → reliable border-radius + overflow:hidden in browser & html2canvas
  // ── Email:   outer <table> with border → compatible with Outlook / Gmail / Notes
  if (forPreview) {
    return `<div style="border:2px solid ${primary};border-radius:8px;overflow:hidden;">${innerTable}</div>`;
  }
  return `<!-- Email Signature — ChunTai Tech / 崇太科技 -->
<table cellpadding="0" cellspacing="0" border="0" width="100%" role="presentation"
       style="border-collapse:separate;border-spacing:0;width:100%;border:2px solid ${primary};border-radius:8px;overflow:hidden;">
  <tr><td style="padding:0;">${innerTable}</td></tr>
</table>`;
}

/* ================================================================
   GENERATE PLAIN TEXT
   ================================================================ */
function generatePlainText() {
  const { nameEn, nameZh, companyEn, companyZh,
          tieLine, mobile, email, website, address, location } = state;
  const lines = [
    `${nameEn}  ${nameZh}`,
    companyEn,
    companyZh,
    '',
  ];
  if (tieLine)  lines.push(`Tel:    ${tieLine}`);
  if (mobile)   lines.push(`Mob:    ${mobile}`);
  if (email)    lines.push(`Email:  ${email}`);
  if (website)  lines.push(`Web:    ${website}`);
  if (address)  lines.push(`Add:    ${address}${location ? ', ' + location : ''}`);
  return lines.join('\n');
}

/* ================================================================
   APPLY COLOR SCHEME → CSS VARIABLES
   ================================================================ */
function applyScheme(key) {
  state.scheme = key;
  const sc = SCHEMES[key];
  const root = document.documentElement;
  root.style.setProperty('--a1',   sc.p);
  root.style.setProperty('--a2',   sc.s);
  root.style.setProperty('--glow', sc.glow);

  document.querySelectorAll('.scheme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.scheme === key);
  });

  const icon = document.getElementById('headerIcon');
  icon.style.background  = `linear-gradient(135deg,${sc.p},${sc.s})`;
  icon.style.boxShadow   = `0 0 24px ${sc.glow}`;
}

/* ================================================================
   RENDER SCHEME BUTTONS
   ================================================================ */
function renderSchemes() {
  const grid = document.getElementById('schemesGrid');
  grid.innerHTML = Object.entries(SCHEMES).map(([key, sc]) => `
    <button class="scheme-btn${key === state.scheme ? ' active' : ''}"
            data-scheme="${key}" onclick="selectScheme('${key}')">
      <div class="scheme-swatch"
           style="background:linear-gradient(135deg,${sc.p},${sc.s});box-shadow:0 2px 8px ${sc.glow};"></div>
      <div class="scheme-label">${sc.name}</div>
    </button>
  `).join('');
}

/* ================================================================
   UPDATE PREVIEW
   ================================================================ */
function updatePreview() {
  document.getElementById('signaturePreview').innerHTML = generateSignatureHTML(true);
  document.getElementById('logoThumb').src = getLogoSrc();

  // ── Bind inline editable fields ──
  document.querySelectorAll('#signaturePreview .editable-label').forEach(span => {
    span.addEventListener('blur', () => {
      const field = span.dataset.field;
      const val = span.textContent;
      state[field] = val;
      // 同步回左側表單
      const formEl = document.getElementById(field);
      if (formEl) formEl.value = val;
    });
    // Enter 確認，不換行
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
    });
  });
}

/* ================================================================
   FIT LOGO DIMENSIONS (maintain aspect ratio within max bounds)
   ================================================================ */
const LOGO_MAX_W = 140;
const LOGO_MAX_H = 90;

function fitLogoDimensions(src, callback) {
  const img = new Image();
  img.onload = function() {
    let w = this.naturalWidth, h = this.naturalHeight;
    if (w > LOGO_MAX_W) { h = Math.round(h * LOGO_MAX_W / w); w = LOGO_MAX_W; }
    if (h > LOGO_MAX_H) { w = Math.round(w * LOGO_MAX_H / h); h = LOGO_MAX_H; }
    state.logoWidth  = w;
    state.logoHeight = h;
    callback();
  };
  img.onerror = function() {
    state.logoWidth  = 75;
    state.logoHeight = 75;
    callback();
  };
  img.src = src;
}

/* ================================================================
   EVENT HANDLERS
   ================================================================ */
function selectScheme(key) {
  applyScheme(key);
  updatePreview();
}

function bindFormInputs() {
  // 文字欄位已改為預覽內直接編輯，此處僅保留 nameColor
  // （若未來需要重新加回表單欄位，在此陣列新增 id 即可）

  const nameColorEl = document.getElementById('nameColor');
  if (nameColorEl) nameColorEl.addEventListener('input', () => { state.nameColor = nameColorEl.value; updatePreview(); });

  const showDotsEl = document.getElementById('showDots');
  if (showDotsEl) showDotsEl.addEventListener('change', () => { state.showDots = showDotsEl.checked; updatePreview(); });


  document.getElementById('logoUrl').addEventListener('input', function() {
    const src = this.value.trim();
    if (src) {
      state.logoSrc = src;
      fitLogoDimensions(src, updatePreview);
    } else {
      state.logoSrc   = DEFAULT_LOGO.src;
      state.logoWidth  = DEFAULT_LOGO.w;
      state.logoHeight = DEFAULT_LOGO.h;
      updatePreview();
    }
  });
}

function bindLogoUpload() {
  document.getElementById('logoFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      state.logoSrc = ev.target.result;
      document.getElementById('logoUrl').value = '';
      fitLogoDimensions(state.logoSrc, updatePreview);
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('resetLogoBtn').addEventListener('click', () => {
    state.logoSrc    = DEFAULT_LOGO.src;
    state.logoWidth  = DEFAULT_LOGO.w;
    state.logoHeight = DEFAULT_LOGO.h;
    document.getElementById('logoUrl').value = '';
    document.getElementById('logoFileInput').value = '';
    updatePreview();
  });
}

/* ================================================================
   COPY TO CLIPBOARD
   ================================================================ */
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2600);
}

function copyText(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  } else {
    // fallback
    const ta = Object.assign(document.createElement('textarea'), {
      value: text,
      style: 'position:fixed;opacity:0;top:0;left:0;'
    });
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast(msg); } catch {}
    document.body.removeChild(ta);
  }
}

document.getElementById('copyHtmlBtn').addEventListener('click', () =>
  copyText(generateSignatureHTML(), '✓ HTML 已複製！請貼到 Email 簽名設定'));

document.getElementById('copyTextBtn').addEventListener('click', () =>
  copyText(generatePlainText(), '✓ 純文字已複製！'));

/* ================================================================
   DOWNLOAD HTML FILE
   ================================================================ */
document.getElementById('downloadHtmlBtn').addEventListener('click', () => {
  const signatureHTML = generateSignatureHTML();
  const fullHTML = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Signature</title>
</head>
<body>
${signatureHTML}
</body>
</html>`;
  const blob = new Blob([fullHTML], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {
    href: url, download: 'signature.html'
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ signature.html 已下載！');
});

/* ================================================================
   DOWNLOAD PNG IMAGE
   ================================================================ */
document.getElementById('downloadImgBtn').addEventListener('click', async () => {
  const btn = document.getElementById('downloadImgBtn');
  const target = document.getElementById('signaturePreview');

  btn.disabled = true;
  btn.textContent = '處理中…';

  try {
    const canvas = await html2canvas(target, {
      backgroundColor: '#ffffff',
      scale: 1,
      useCORS: true,
      logging: false,
    });
    const url = canvas.toDataURL('image/png');
    const a = Object.assign(document.createElement('a'), {
      href: url, download: 'signature.png'
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('✓ signature.png 已下載！');
  } catch (err) {
    showToast('⚠ 截圖失敗，請確認 Logo 圖片來源是否允許跨域');
    console.error('html2canvas error:', err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🖼 下載圖片';
  }
});

/* ================================================================
   INIT
   ================================================================ */
(function init() {
  renderSchemes();
  applyScheme(state.scheme);
  bindFormInputs();
  bindLogoUpload();
  updatePreview();
})();
</script>
</body>
